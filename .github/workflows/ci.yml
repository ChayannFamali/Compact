name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Проверка форматирования
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
      - name: Check scalafmt
        run: sbt checkFormatAll

  # Сборка и тесты
  build:
    name: Build & Test (Scala ${{ matrix.scala }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scala: [ "3.4.2" ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Compile
        run: sbt "+compile"

      - name: Test
        run: sbt "+test"

      - name: Package (без публикации)
        run: sbt "+package"
